<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colección</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="css/mazos.css" rel="stylesheet">
    <link href="css/scrollbar.css" rel="stylesheet">
    <link href="css/app-layout.css" rel="stylesheet">

</head>

<body>

<div class="menu-container">
    <!-- Botones del menú -->
    <a href="vistaJuego.html" class="btn btn-menu">Jugar Partida</a>
    <a href="mazos.html" class="btn btn-menu">Mazos</a>
    <a href="crearMazos.html" class="btn btn-menu">Crear Mazos</a>
    <a href="mejorarCartas.html" class="btn btn-menu">Mejorar Cartas</a>
    <a href="coleccion.html" class="btn btn-menu">Colección</a>
    <a href="tienda.html" class="btn btn-menu">Tienda</a>
    <a href="desafios.html" class="btn btn-menu">Desafíos</a>
    <a href="opciones.html" class="btn btn-menu">Opciones</a>
    <button onclick="abrirModalLogout()" class="btn btn-logout">Cerrar Sesión</button>
</div>

<div class="content-container">
    <h2>Colección de Cartas</h2>
    <div class="faccion-toolbar">
        <div class="faccion-tabs">
            <button id="tab-coleccion-heroes" class="btn faccion-tab active" data-faccion="H">Héroes</button>
            <button id="tab-coleccion-villanos" class="btn faccion-tab" data-faccion="V">Villanos</button>
        </div>
        <div id="faccion-coleccion-actual" class="faccion-actual">Vista actual: Héroes</div>
        <div class="d-flex align-items-center" style="gap:8px; flex-wrap:wrap;">
            <input id="busqueda-coleccion" type="text" class="form-control" placeholder="Buscar carta..." style="width:auto; min-width:220px;">
            <select id="selector-afiliacion-coleccion" class="form-control" style="width:auto; min-width:220px;"></select>
            <div class="d-flex align-items-center" style="gap:6px; padding:6px 10px; border:1px solid rgba(0, 209, 255, 0.35); border-radius:10px; background:rgba(8, 20, 40, 0.55);">
                <input id="ordenar-poder-coleccion" type="checkbox" style="transform:scale(1.08);">
                <label for="ordenar-poder-coleccion" style="margin:0; font-size:0.82rem; color:#dff8ff; white-space:nowrap;">Ordenar por poder</label>
            </div>
        </div>
    </div>

    <!-- Elemento para mostrar el progreso de la colección -->
    <div id="progreso-coleccion" class="progreso-coleccion">
        <!-- El texto de progreso se actualizará dinámicamente -->
    </div>
    <div id="contenedor-cartas" class="contenedor-cartas">
        <!-- Las cartas se cargarán aquí dinámicamente -->
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
 <script src="js/cartas.js"></script>
<script src="coleccion.js"></script>
<!-- Bootstrap JS and dependencies -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="js/menu-mobile.js" defer></script>

</body>
</html>
