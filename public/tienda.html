<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Tienda</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/mazos.css" rel="stylesheet">
    <link href="css/salud.css" rel="stylesheet">
    <link href="css/scrollbar.css" rel="stylesheet">
    <link href="css/app-layout.css" rel="stylesheet">

    <style>
        .tienda-panel {
            background: rgba(8, 18, 36, 0.78);
            border: 1px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.38);
            border-radius: 14px;
            box-shadow: 0 0 18px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.25);
            padding: 16px;
            margin-bottom: 16px;
        }

        .tienda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .puntos-usuario {
            background: rgba(255, 215, 0, 0.14);
            border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700;
            border-radius: 999px;
            padding: 8px 14px;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.45);
        }

        .fecha-rotacion {
            color: #ccefff;
            font-size: 0.9rem;
        }

        .rotacion-wrapper {
            width: min(280px, 100%);
            margin-top: 6px;
        }

        .rotacion-timer {
            color: #ffd700;
            font-size: 0.9rem;
            font-weight: 700;
            text-align: right;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.45);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            width: 100%;
            white-space: nowrap;
        }

        .rotacion-timer-valor {
            display: inline-block;
            min-width: 0;
            text-align: right;
            font-family: "Consolas", "Courier New", monospace;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        .rotacion-barra {
            margin-top: 6px;
            height: 10px;
            border-radius: 999px;
            background: rgba(38, 32, 4, 0.75);
            border: 1px solid rgba(255, 215, 0, 0.4);
            overflow: hidden;
            box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.45);
        }

        .rotacion-barra-progreso {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffea70);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.55);
            transition: width 0.4s ease;
        }

        .tienda-grid-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 220px));
            gap: 16px;
            justify-content: start;
        }

        .item-tienda {
            background: rgba(10, 20, 40, 0.85);
            border: 1px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.4);
            border-radius: 12px;
            box-shadow: 0 0 14px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.2);
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .preview-carta {
            position: relative;
            width: 100%;
            aspect-ratio: 6.3 / 8.8;
            border-radius: 10px;
            overflow: hidden;
            background-size: cover;
            background-position: center top;
            border: 2px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.7);
        }

        .preview-carta.nivel-legendaria {
            border-color: rgba(172, 96, 255, 0.92);
            box-shadow: 0 0 14px rgba(156, 66, 255, 0.45), 0 0 24px rgba(112, 39, 199, 0.34);
        }

        .preview-carta.nivel-legendaria .detalles-carta {
            color: #d5b5ff;
            text-shadow: 0 0 6px rgba(186, 112, 255, 0.75);
        }

        .preview-carta .detalles-carta {
            font-size: 0.72rem;
        }

        .badge-nivel {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 999px;
            background: rgba(255, 215, 0, 0.9);
            color: #2c2400;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 3;
        }

        .precio-item {
            color: #ffd700;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.35);
        }

        .agotada {
            opacity: 0.58;
            filter: grayscale(0.4);
        }

        .objetos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .objeto-tienda {
            background: rgba(10, 20, 40, 0.85);
            border: 1px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.38);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 0 0 14px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.2);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tienda-panel .btn-primary,
        #modal-confirmacion .btn-primary {
            background-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.3);
            border-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.62);
            box-shadow: 0 0 12px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.22);
        }

        .tienda-panel .btn-primary:hover:not(:disabled),
        #modal-confirmacion .btn-primary:hover:not(:disabled) {
            background-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.5);
            border-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.9);
            box-shadow: 0 0 14px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.45);
        }

        .objeto-tienda h5 {
            margin: 0;
            color: #dff8ff;
        }

        .objeto-tienda-desc {
            margin: 0;
            color: #bde6ff;
            font-size: 0.9rem;
        }

        .tienda-objetos-layout {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .tienda-objetos-subtitulo {
            margin: 6px 0 0;
            color: #ffd700;
            font-size: 1.02rem;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .tienda-objetos-fila.tienda-objetos-mejoras {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
            align-items: stretch;
        }

        .tienda-objetos-fila.tienda-objetos-sobres-heroes,
        .tienda-objetos-fila.tienda-objetos-sobres-villanos {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            align-items: stretch;
        }

        .objeto-tienda-mejora-cabecera {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .objeto-tienda-mejora-icono {
            width: 56px;
            height: 56px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .objeto-tienda-mejora-texto-top h5 {
            margin: 0;
            color: #dff8ff;
        }

        .preview-sobre-tienda {
            width: min(124px, 68%);
            aspect-ratio: 6.3 / 8.8;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: 2px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.7);
            background-color: rgba(6, 14, 28, 0.65);
            flex-shrink: 0;
        }

        .tienda-badge-carta-obtenida {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            min-width: min(118px, 80%);
            padding: 7px 10px;
            border-radius: 10px;
            text-align: center;
            background: rgba(4, 14, 28, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.55);
            box-shadow:
                0 4px 16px rgba(0, 0, 0, 0.58),
                0 0 14px rgba(255, 215, 0, 0.22);
        }

        .tienda-badge-carta-obtenida-titulo {
            font-size: 0.67rem;
            font-weight: 800;
            color: #ffd84a;
            line-height: 1.2;
            letter-spacing: 0.04em;
        }

        .tienda-badge-carta-obtenida-nivel {
            margin-top: 3px;
            font-size: 0.78rem;
            font-weight: 700;
            color: #e8f6ff;
            line-height: 1.15;
        }

        .objeto-tienda-nombre-sobre {
            margin: 2px 0 0;
            color: #dff8ff;
            font-size: 0.95rem;
            text-align: center;
        }

        .objeto-tienda-desc-sobre {
            font-size: 0.82rem;
            text-align: center;
        }

        #mensaje-tienda {
            display: none;
        }

        .tienda-toolbar-pestanas {
            margin-bottom: 14px;
        }

        .tienda-wrap-ofertas-dia {
            width: 100%;
            margin-bottom: 22px;
        }

        .tienda-wrap-ofertas-dia .tienda-seccion-cartas-titulo {
            text-align: center;
            margin-top: 0;
        }

        .tienda-ofertas-dia-timer-wrap {
            width: 100%;
            max-width: min(420px, 100%);
            margin: 0 auto 14px;
        }

        .tienda-ofertas-dia-timer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: baseline;
            gap: 8px 10px;
            color: #9edcff;
            font-size: 0.88rem;
            font-weight: 600;
            text-align: center;
        }

        .tienda-ofertas-dia-timer-label {
            color: #ccefff;
        }

        .tienda-ofertas-dia-timer-valor {
            font-family: "Consolas", "Courier New", monospace;
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            color: #ffd700;
            font-weight: 800;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
            white-space: nowrap;
        }

        .tienda-ofertas-dia-barra {
            margin-top: 8px;
        }

        .tienda-grid-ofertas-dia {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 240px));
            justify-content: center;
            gap: clamp(12px, 3vw, 24px);
            width: 100%;
        }

        @media (max-width: 520px) {
            .tienda-grid-ofertas-dia {
                grid-template-columns: minmax(0, 240px);
                justify-items: stretch;
            }
        }

        .tienda-seccion-cartas-titulo {
            margin: 18px 0 10px;
            color: #ffd700;
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .tienda-seccion-cartas-titulo:first-child {
            margin-top: 0;
        }

        .preview-carta-tienda .badge-afiliacion-carta-tablero {
            top: 6px;
            right: 6px;
            left: auto;
        }

        .preview-carta-tienda.preview-carta-tienda--oferta .estrellas-carta {
            top: 40px;
        }

        .tienda-badge-descuento {
            position: absolute;
            top: 8px;
            left: -32px;
            z-index: 9;
            padding: 5px 40px;
            background: linear-gradient(135deg, #ff4444, #c40000);
            color: #fff;
            font-weight: 900;
            font-size: 0.68rem;
            letter-spacing: 0.12em;
            transform: rotate(-42deg);
            transform-origin: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.45);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.65);
            pointer-events: none;
        }

        .tienda-precio-original {
            text-decoration: line-through;
            opacity: 0.62;
            margin-right: 8px;
            font-weight: 600;
        }

        .tienda-precio-oferta {
            font-weight: 800;
            margin-right: 4px;
        }

        .tienda-precio-moneda {
            width: 18px;
            height: 18px;
            object-fit: contain;
            vertical-align: text-bottom;
        }

        .tienda-objetos-grid-mezclas .tienda-objetos-cuadricula {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            align-items: stretch;
        }

        @media (max-width: 899px) {
            .tienda-grid-cartas {
                grid-template-columns: repeat(auto-fill, minmax(clamp(132px, 42vw, 200px), 1fr));
                gap: clamp(8px, 2vw, 12px);
            }
            .item-tienda {
                padding: 8px;
            }
            .tienda-objetos-fila.tienda-objetos-mejoras {
                grid-template-columns: 1fr;
            }
            .tienda-objetos-fila.tienda-objetos-sobres-heroes,
            .tienda-objetos-fila.tienda-objetos-sobres-villanos {
                grid-template-columns: repeat(auto-fit, minmax(min(200px, 46vw), 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="vistaJuego.html" class="btn btn-menu">Jugar Partida</a>
        <a href="mazos.html" class="btn btn-menu">Mazos</a>
        <a href="crearMazos.html" class="btn btn-menu">Crear Mazos</a>
        <a href="mejorarCartas.html" class="btn btn-menu">Mejorar Cartas</a>
        <a href="coleccion.html" class="btn btn-menu">Colección</a>
        <a href="tienda.html" class="btn btn-menu">Tienda</a>
        <a href="desafios.html" class="btn btn-menu">Desafíos</a>
        <a href="asaltos.html" class="btn btn-menu">Asaltos</a>
        <a href="opciones.html" class="btn btn-menu">Opciones</a>
        <button onclick="abrirModalLogout()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="content-container">
        <div class="tienda-panel tienda-header">
            <h2>Tienda Diaria</h2>
            <div class="d-flex flex-column align-items-end">
                <div id="puntos-usuario" class="puntos-usuario"><img src="/resources/icons/moneda.png" alt="Moneda" style="width:28px;height:28px;object-fit:contain;vertical-align:text-bottom;margin-right:6px;">0</div>
                <div class="rotacion-wrapper">
                    <div id="rotacion-timer" class="rotacion-timer">
                        <span>Nuevas cartas en:</span>
                        <span id="rotacion-timer-valor" class="rotacion-timer-valor">0s</span>
                    </div>
                    <div class="rotacion-barra">
                        <div id="rotacion-barra-progreso" class="rotacion-barra-progreso"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="mensaje-tienda" class="alert"></div>

        <div class="faccion-toolbar tienda-toolbar-pestanas" role="tablist" aria-label="Secciones de la tienda">
            <div class="faccion-tabs">
                <button type="button" class="btn faccion-tab active" data-tienda-tab="cartas">Cartas</button>
                <button type="button" class="btn faccion-tab" data-tienda-tab="objetos">Objetos</button>
                <button type="button" class="btn faccion-tab" data-tienda-tab="sobres">Sobres</button>
            </div>
        </div>

        <div id="panel-tienda-cartas" class="tienda-panel">
            <h3 class="mb-3" style="color:#dff8ff;font-size:1.15rem;">Rotación actual</h3>
            <div id="tienda-cartas"></div>
        </div>

        <div id="panel-tienda-objetos" class="tienda-panel" hidden>
            <h3 class="mb-3" style="color:#dff8ff;font-size:1.15rem;">Objetos de mejora</h3>
            <div id="tienda-objetos" class="objetos-grid"></div>
        </div>

        <div id="panel-tienda-sobres" class="tienda-panel" hidden>
            <h3 class="mb-3" style="color:#dff8ff;font-size:1.15rem;">Sobres de cartas</h3>
            <div id="tienda-sobres"></div>
        </div>
    </div>

    <div id="modal-confirmacion" class="modal" style="display: none;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background: rgba(12, 20, 36, 0.96); border: 1px solid rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.35); box-shadow: 0 0 18px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.3);">
                <div class="modal-body text-center">
                    <h5 style="color:#dff8ff;">Confirmar compra</h5>
                    <p id="texto-confirmacion" style="color:#bde6ff; margin-top: 10px;"></p>
                    <div class="d-flex justify-content-center" style="gap: 10px;">
                        <button id="btn-confirmar-compra" class="btn btn-primary">Aceptar</button>
                        <button id="btn-cancelar-compra" class="btn btn-secondary">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="js/cartas.js"></script>
    <script src="js/sobresCartas.js"></script>
    <script src="js/misionesDiarias.js"></script>
    <script src="tienda.js"></script>
    <script src="js/menu-mobile.js" defer></script>
</body>
</html>
