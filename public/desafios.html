<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Desafíos</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link href="css/mazos.css" rel="stylesheet">
    <link href="css/salud.css" rel="stylesheet">
    <link href="css/scrollbar.css" rel="stylesheet">
    <link href="css/app-layout.css" rel="stylesheet">

    <style>
        .desafios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
            gap: 16px;
            padding: 10px 0 20px;
            align-items: stretch;
        }

        .desafio-nivel-tabs {
            margin: 10px 0 14px;
        }

        .desafio-camino-tabs {
            margin: 10px 0 8px;
        }

        .desafio-nivel-tab {
            min-width: 124px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .desafio-nivel-tab .candado {
            font-size: 0.9rem;
            line-height: 1;
        }

        .desafio-nivel-tab.tab-bloqueada {
            border-color: rgba(255, 80, 80, 0.45);
            background: rgba(60, 10, 10, 0.52);
            color: #ffc8c8;
            box-shadow: inset 0 0 10px rgba(255, 60, 60, 0.22);
            opacity: 0.95;
        }

        .desafio-nivel-tab.tab-bloqueada:hover {
            color: #ffd8d8;
        }

        .desafio-card {
            background: linear-gradient(
                140deg,
                rgba(8, 18, 36, 0.9),
                rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.16)
            );
            border: 1px solid rgba(0, 209, 255, 0.35);
            border-radius: 14px;
            box-shadow: 0 0 16px rgba(0, 123, 255, 0.25);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 560px;
            height: 100%;
        }

        .desafio-nombre {
            color: #dff8ff;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .desafio-descripcion {
            color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.86);
            font-size: 0.9rem;
            min-height: 48px;
        }

        .desafio-meta {
            color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.9);
            font-size: 0.84rem;
        }

        /* Misma presentación que paneles de eventos en vistaJuego (jugarPartida.css), solo bloque recompensas */
        .evento-recompensas-label {
            color: #ffd700;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.7);
        }

        .evento-recompensas {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.42);
            border-radius: 10px;
            padding: 7px 9px;
            color: #ffd700;
            font-size: 0.78rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .evento-recompensa-tag {
            border: 1px solid rgba(255, 215, 0, 0.6);
            background: rgba(255, 215, 0, 0.14);
            border-radius: 999px;
            padding: 3px 8px;
            color: #ffd700;
            font-size: 0.66rem;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .desafio-card.pendiente {
            box-shadow: 0 0 14px rgba(46, 255, 120, 0.28), 0 0 24px rgba(46, 255, 120, 0.16);
            border-color: rgba(46, 255, 120, 0.42);
        }

        .desafio-card.completado {
            box-shadow: 0 0 14px rgba(255, 78, 78, 0.35), 0 0 24px rgba(255, 78, 78, 0.2);
            border-color: rgba(255, 88, 88, 0.48);
        }

        .desafio-enemigos-label {
            color: #ff5f5f;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 0 0 8px rgba(255, 42, 42, 0.7);
            margin-bottom: -2px;
        }

        .desafio-enemigos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(78px, 78px));
            gap: 8px;
        }

        .desafio-enemigo-card {
            width: 78px;
            height: 108px;
            border: 1px solid rgba(0, 123, 255, 0.5);
            border-radius: 8px;
            background-size: cover;
            background-position: center top;
            position: relative;
            overflow: hidden;
        }

        .desafio-enemigo-card.boss {
            border: 2px solid rgba(255, 102, 40, 0.95);
            box-shadow: 0 0 10px rgba(255, 95, 31, 0.7), 0 0 16px rgba(255, 42, 42, 0.45);
        }

        .desafio-enemigo-nombre {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 3px 4px;
            font-size: 0.56rem;
            line-height: 1.1;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            text-align: center;
        }

        .desafio-enemigo-card.boss .desafio-enemigo-nombre {
            background: linear-gradient(90deg, rgba(150, 22, 22, 0.92), rgba(255, 95, 31, 0.88));
        }

        .desafio-recompensa-card {
            width: 62px;
            height: 88px;
            border: 1px solid rgba(0, 123, 255, 0.55);
            border-radius: 7px;
            background-size: cover;
            background-position: center top;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.24);
        }

        .desafio-recompensa-card .desafio-enemigo-nombre {
            font-size: 0.5rem;
            padding: 2px 3px;
        }

        .desafio-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Tema villano: reemplaza acentos azules por rojos */
        .content-container.camino-villano-activo .desafio-nivel-tab,
        .content-container.camino-villano-activo .faccion-tab {
            border-color: rgba(255, 82, 82, 0.45);
            color: #ffd5d5;
            background-color: rgba(46, 12, 12, 0.72);
        }

        .content-container.camino-villano-activo .desafio-nivel-tab.active,
        .content-container.camino-villano-activo .faccion-tab.active {
            background: linear-gradient(180deg, rgba(255, 70, 70, 0.38), rgba(125, 18, 18, 0.24));
            border-color: rgba(255, 110, 110, 0.95);
            box-shadow: 0 0 16px rgba(255, 60, 60, 0.45);
            color: #fff3f3;
        }

        .content-container.camino-villano-activo .desafio-card {
            background: linear-gradient(140deg, rgba(40, 8, 12, 0.9), rgba(110, 16, 22, 0.26));
            border-color: rgba(255, 88, 88, 0.36);
            box-shadow: 0 0 16px rgba(255, 52, 52, 0.22);
        }

        .desafio-bottom .btn-primary:not(:disabled) {
            background-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.34);
            border-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.72);
            box-shadow: 0 0 12px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.28);
        }

        .desafio-bottom .btn-primary:not(:disabled):hover {
            background-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.52);
            border-color: rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.95);
            box-shadow: 0 0 16px rgba(var(--dc-accent-user-rgb, 0, 123, 255), 0.42);
        }

        .content-container.camino-villano-activo .desafio-card.pendiente {
            box-shadow: 0 0 14px rgba(255, 102, 102, 0.28), 0 0 24px rgba(255, 66, 66, 0.16);
            border-color: rgba(255, 108, 108, 0.42);
        }

        .content-container.camino-villano-activo .desafio-meta,
        .content-container.camino-villano-activo .desafio-descripcion {
            color: #ffd9d9;
        }

        .content-container.camino-villano-activo .desafio-nombre {
            color: #ffe8e8;
            text-shadow: 0 0 8px rgba(255, 82, 82, 0.38);
        }

        .content-container.camino-villano-activo .desafio-enemigo-card,
        .content-container.camino-villano-activo .desafio-recompensa-card {
            border-color: rgba(255, 88, 88, 0.72);
            box-shadow: 0 0 10px rgba(255, 72, 72, 0.26);
        }

        .content-container.camino-villano-activo .modal-seleccion-contenido {
            border-color: rgba(255, 90, 90, 0.38);
            box-shadow: 0 0 20px rgba(255, 60, 60, 0.22);
        }

        .content-container.camino-villano-activo .modal-header-desafio,
        .content-container.camino-villano-activo .modal-footer-desafio {
            border-color: rgba(255, 96, 96, 0.3);
        }

        .modal-seleccion-mazo {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            z-index: 2100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .modal-seleccion-contenido {
            width: min(1120px, 96vw);
            max-height: 92vh;
            overflow: hidden;
            background: rgba(8, 18, 36, 0.96);
            border: 1px solid rgba(0, 209, 255, 0.36);
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.28);
            display: flex;
            flex-direction: column;
        }

        .modal-header-desafio {
            padding: 12px 14px;
            border-bottom: 1px solid rgba(0, 209, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .estado-seleccion {
            color: #ffd700;
            font-weight: 700;
        }

        .filtros-seleccion {
            padding: 10px 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .cartas-seleccion-grid {
            padding: 0 14px 14px;
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(154px, 154px));
            grid-auto-rows: max-content;
            gap: 11px;
            justify-content: start;
            align-items: start;
        }

        .carta-mini {
            position: relative;
            width: 100%;
            height: 216px;
            border: 2px solid rgba(36, 156, 255, 0.7);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.25);
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            background-size: cover;
            background-position: center top;
        }

        .carta-mini:hover {
            box-shadow: 0 0 16px rgba(0, 209, 255, 0.55);
        }

        .carta-mini.seleccionada {
            box-shadow: 0 0 16px 4px rgba(255, 215, 0, 0.82);
            border-color: rgba(255, 215, 0, 0.95);
        }

        .carta-mini.nivel-legendaria.seleccionada {
            border-color: rgba(255, 215, 0, 0.95);
            box-shadow: 0 0 16px 4px rgba(255, 215, 0, 0.82), 0 0 24px rgba(156, 66, 255, 0.35);
        }

        .carta-mini .detalles-carta {
            font-size: 0.64rem;
            padding: 4px;
        }

        .carta-mini.nivel-legendaria {
            border-color: rgba(172, 96, 255, 0.92);
            box-shadow: 0 0 14px rgba(156, 66, 255, 0.45), 0 0 26px rgba(128, 0, 255, 0.34);
        }

        .carta-mini.nivel-legendaria .detalles-carta {
            color: #d5b5ff;
            text-shadow: 0 0 6px rgba(186, 112, 255, 0.75);
            border-top-color: rgba(186, 112, 255, 0.6);
            box-shadow: 0 -2px 8px rgba(156, 66, 255, 0.45);
        }

        .carta-mini.nivel-legendaria .estrellas-carta {
            background-color: rgba(58, 24, 90, 0.78);
            border-color: rgba(186, 112, 255, 0.6);
            box-shadow: 0 0 8px rgba(156, 66, 255, 0.5);
        }

        .modal-footer-desafio {
            padding: 12px 14px;
            border-top: 1px solid rgba(0, 209, 255, 0.3);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="menu-container">
        <a href="vistaJuego.html" class="btn btn-menu">Jugar Partida</a>
        <a href="mazos.html" class="btn btn-menu">Mazos</a>
        <a href="crearMazos.html" class="btn btn-menu">Crear Mazos</a>
        <a href="mejorarCartas.html" class="btn btn-menu">Mejorar Cartas</a>
        <a href="coleccion.html" class="btn btn-menu">Colección</a>
        <a href="tienda.html" class="btn btn-menu">Tienda</a>
        <a href="desafios.html" class="btn btn-menu">Desafíos</a>
        <a href="opciones.html" class="btn btn-menu">Opciones</a>
        <button onclick="abrirModalLogout()" class="btn btn-logout">Cerrar Sesión</button>
    </div>

    <div class="content-container">
        <h2>Desafíos</h2>
        <div id="mensaje-desafios" class="alert alert-warning" style="display:none;"></div>
        <div id="desafios-camino-tabs" class="faccion-tabs desafio-camino-tabs"></div>
        <div id="desafios-nivel-tabs" class="faccion-tabs desafio-nivel-tabs"></div>
        <div id="desafios-grid" class="desafios-grid"></div>
    </div>

    <div id="modal-seleccion-desafio" class="modal-seleccion-mazo">
        <div class="modal-seleccion-contenido">
            <div class="modal-header-desafio">
                <h4>Selecciona 6 cartas para el desafío</h4>
                <div id="estado-seleccion-desafio" class="estado-seleccion">Seleccionadas: 0 / 6</div>
            </div>
            <div class="filtros-seleccion">
                <div id="filtro-faccion-tabs-desafio" class="faccion-tabs">
                    <button id="filtro-faccion-h" class="btn faccion-tab active" type="button">Héroes</button>
                    <button id="filtro-faccion-v" class="btn faccion-tab" type="button">Villanos</button>
                </div>
                <select id="filtro-afiliacion-desafio" class="form-control" style="width:auto; min-width:220px;"></select>
            </div>
            <div id="cartas-desafio-grid" class="cartas-seleccion-grid"></div>
            <div class="modal-footer-desafio">
                <button id="cancelar-desafio-btn" class="btn btn-secondary" type="button">Cancelar</button>
                <button id="confirmar-desafio-btn" class="btn btn-primary" type="button" disabled>Jugar</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="js/cartas.js"></script>
    <script src="js/limpiarPvpPartidaLocal.js"></script>
    <script src="desafios.js"></script>
    <script src="js/menu-mobile.js" defer></script>
</body>
</html>
