<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <title>Tablero de Partida</title>
    <!-- CSS personalizado -->
    <link href="css/mazos.css" rel="stylesheet">
    <link href="css/salud.css" rel="stylesheet">
    <link href="css/tablero.css" rel="stylesheet">
    <link href="css/app-layout.css" rel="stylesheet">

    <script src="/socket.io/socket.io.js"></script>
    <!-- Scripts -->
</head>

<body>

<div class="tablero-container">
    <div id="aviso-turno" class="aviso-turno"></div>
    <div id="ventana-emergente-fin" class="ventana-emergente">
        <div class="ventana-contenido">
            <h2 id="titulo-fin-partida"></h2>
            <p id="mensaje-fin-partida"></p>
            <!-- Aquí se podrán mostrar las recompensas o más información -->
            <div id="recompensas-container"></div>
            <div class="acciones-fin-partida">
                <button id="boton-reiniciar-partida">Reiniciar Partida</button>
                <button id="boton-volver-menu">Volver al menú</button>
            </div>
        </div>
    </div>
    <!-- Jugador 1 (Oponente) en la parte superior -->
    <div class="jugador jugador-oponente">
        <div class="info-jugador">
            <div id="turno-oponente-label" class="turno-indicador">Turno de BOT</div>
            <div class="panel-identidad-jugador">
                <img id="panel-oponente-avatar" class="panel-jugador-avatar" alt="Avatar oponente">
                <h2 id="nombre-oponente">Oponente</h2>
            </div>
            <div id="contador-mazo-oponente" class="contador-mazo"></div>
        </div>
        <div class="slots-jugador" id="slots-oponente">
            <!-- 3 slots con identificadores únicos para el oponente -->
            <div class="slot" id="slot-oponente-1"></div>
            <div class="slot" id="slot-oponente-2"></div>
            <div class="slot" id="slot-oponente-3"></div>
            <button id="mazo-oponente" class="mazo-btn" disabled></button>
        </div>
    </div>

    <!-- Jugador 2 (Tú) en la parte inferior -->
    <div class="jugador jugador-propio">
        <div class="info-jugador">
            <div id="turno-jugador-label" class="turno-indicador">Turno de Jugador</div>
            <div class="panel-identidad-jugador">
                <img id="panel-jugador-avatar" class="panel-jugador-avatar" alt="Avatar jugador">
                <h2 id="nombre-jugador">Tú</h2>
            </div>
            <div id="contador-mazo-jugador" class="contador-mazo"></div>
            <button onclick="abandonarPartida()" class="btn btn-abandonar">Abandonar Partida</button>
        </div>
        <div class="slots-jugador" id="slots-jugador">
            <!-- 3 slots con identificadores únicos para el jugador -->
            <div class="slot" id="slot-jugador-1"></div>
            <div class="slot" id="slot-jugador-2"></div>
            <div class="slot" id="slot-jugador-3"></div>
            <button id="mazo-jugador" class="mazo-btn"></button>
        </div>
    </div>
</div>
<div id="modal-seleccion-habilidad" class="modal-habilidad-seleccion" style="display:none;">
    <div class="modal-habilidad-contenido">
        <h3 id="modal-habilidad-titulo">Seleccionar objetivo</h3>
        <div id="modal-habilidad-lista" class="modal-habilidad-lista"></div>
        <div class="modal-habilidad-acciones">
            <button type="button" id="modal-habilidad-confirmar" class="modal-habilidad-btn modal-habilidad-btn-primary">Confirmar</button>
            <button type="button" id="modal-habilidad-cancelar" class="modal-habilidad-btn modal-habilidad-btn-secondary">Cancelar</button>
        </div>
    </div>
</div>
<div id="modal-abandonar-partida" class="ventana-emergente" style="display:none;">
    <div class="ventana-contenido">
        <h2>Abandonar partida</h2>
        <p id="modal-abandonar-mensaje">Hay una partida en curso. ¿Seguro que quieres abandonar esta vista?</p>
        <div class="acciones-fin-partida">
            <button type="button" id="modal-abandonar-confirmar">Abandonar</button>
            <button type="button" id="modal-abandonar-cancelar">Cancelar</button>
        </div>
    </div>
</div>

<!-- Bootstrap JS and dependencies -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

<script src="/socket.io/socket.io.js"></script>
<script src="cliente.js"></script>
<script src="js/tradeGrupo.js"></script>
<script src="js/cartas.js"></script>
<script src="js/skinsCartas.js"></script>
<script src="js/misionesDiarias.js"></script>
<script src="js/limpiarPvpPartidaLocal.js"></script>
<script src="js/tableroFondo.js"></script>
<script src="js/healDebuffCombat.js"></script>
<script src="partida.js"></script>
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="js/menu-mobile.js" defer></script>

</body>
</html>
